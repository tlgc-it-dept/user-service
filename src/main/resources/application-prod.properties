# ===== DATABASE (external injection only) =====
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=false

# ===== HIKARI (safe production tuning) =====
spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:30}
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:10}
spring.datasource.hikari.max-lifetime=${DB_MAX_LIFETIME:1800000}
spring.datasource.hikari.connection-timeout=${DB_TIMEOUT:30000}

# ===== THREADING =====
spring.task.execution.pool.core-size=${THREAD_CORE:8}
spring.task.execution.pool.max-size=${THREAD_MAX:16}
spring.task.execution.pool.queue-capacity=${THREAD_QUEUE:200}
spring.task.execution.pool.keep-alive=${THREAD_KEEPALIVE:60000}

# ===== LOGGING =====
logging.level.root=WARN
logging.level.org.springframework=WARN